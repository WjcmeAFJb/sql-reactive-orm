<svg viewBox="0 0 440 360" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Reactive ORM: database rows become Promise-typed fields on reactive components">
  <defs>
    <linearGradient id="dbBody" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f472b6"/>
      <stop offset="100%" stop-color="#be185d"/>
    </linearGradient>
    <radialGradient id="hubGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#ec4899" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#ec4899" stop-opacity="0"/>
    </radialGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="0" dy="2" result="offsetblur"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.2"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <g transform="translate(50, 230)" filter="url(#softShadow)">
    <ellipse cx="36" cy="10" rx="36" ry="10" fill="#f472b6"/>
    <path d="M 0,10 L 0,82 A 36,10 0 0 0 72,82 L 72,10" fill="url(#dbBody)"/>
    <ellipse cx="36" cy="10" rx="36" ry="10" fill="none" stroke="#ffffff" stroke-width="1.1" opacity="0.45"/>
    <path d="M 0,36 A 36,10 0 0 0 72,36" fill="none" stroke="#ffffff" stroke-width="0.9" opacity="0.3"/>
    <path d="M 0,60 A 36,10 0 0 0 72,60" fill="none" stroke="#ffffff" stroke-width="0.9" opacity="0.3"/>
    <text x="36" y="52" text-anchor="middle" fill="white" font-size="12" font-family="ui-sans-serif, system-ui, -apple-system, sans-serif" font-weight="700">SQLite</text>
  </g>

  <path d="M 124,250 Q 165,210 192,192" fill="none" stroke="#be185d" stroke-width="2.5" stroke-linecap="round"/>
  <polygon points="194,188 199,196 186,198" fill="#be185d"/>

  <g transform="translate(220, 180)">
    <circle cx="0" cy="0" r="56" fill="url(#hubGlow)"/>
    <circle cx="0" cy="0" r="30" fill="#ec4899" filter="url(#softShadow)"/>
    <text x="0" y="5" text-anchor="middle" fill="white" font-size="14" font-weight="700" font-family="ui-sans-serif, system-ui, -apple-system, sans-serif">orm</text>
  </g>

  <g fill="none" stroke="#ec4899" stroke-width="2.2" stroke-linecap="round" stroke-dasharray="5 5">
    <path d="M 246,156 Q 290,108 310,82"/>
    <path d="M 252,180 Q 290,180 322,180"/>
    <path d="M 246,204 Q 290,252 310,278"/>
  </g>

  <g font-family="ui-mono, ui-monospace, 'SF Mono', Menlo, monospace" font-size="10" font-weight="600">
    <g transform="translate(356, 82)">
      <rect x="-44" y="-18" width="88" height="36" rx="8" fill="#fdf2f8" stroke="#ec4899" stroke-width="1.8"/>
      <circle cx="-30" cy="0" r="3.5" fill="#ec4899"/>
      <text x="-20" y="3" text-anchor="start" fill="#9d174d">Account</text>
    </g>
    <g transform="translate(368, 180)">
      <rect x="-44" y="-18" width="88" height="36" rx="8" fill="#fdf2f8" stroke="#ec4899" stroke-width="1.8"/>
      <circle cx="-30" cy="0" r="3.5" fill="#ec4899"/>
      <text x="-20" y="3" text-anchor="start" fill="#9d174d">Totals</text>
    </g>
    <g transform="translate(356, 278)">
      <rect x="-44" y="-18" width="88" height="36" rx="8" fill="#fdf2f8" stroke="#ec4899" stroke-width="1.8"/>
      <circle cx="-30" cy="0" r="3.5" fill="#ec4899"/>
      <text x="-20" y="3" text-anchor="start" fill="#9d174d">TxList</text>
    </g>
  </g>

  <g font-family="ui-sans-serif, system-ui, -apple-system, sans-serif" font-size="10" font-weight="600" fill="#be185d">
    <text x="160" y="218" text-anchor="middle">rows</text>
    <text x="294" y="146" text-anchor="middle" opacity="0.85">use()</text>
  </g>
</svg>
